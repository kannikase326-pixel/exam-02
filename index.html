<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ High Voltage Quiz — 91 ข้อ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --surface2: #f1f3f4;
  --border: #e0e0e0;
  --blue: #1a73e8;
  --blue-light: #e8f0fe;
  --blue-mid: #c5d8fb;
  --green: #137333;
  --green-bg: #e6f4ea;
  --green-border: #81c995;
  --red: #c5221f;
  --red-bg: #fce8e6;
  --red-border: #f28b82;
  --orange: #b06000;
  --orange-bg: #fff3e0;
  --orange-border: #ffb74d;
  --text: #202124;
  --text2: #5f6368;
  --text3: #80868b;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Sarabun', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.5;
}

/* ─── TOP BAR ─── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 56px;
  box-shadow: var(--shadow);
}

.topbar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}

.topbar-title span { color: var(--blue); }

.progress-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.progress-track {
  height: 5px;
  background: var(--surface2);
  border-radius: 9999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 9999px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.progress-label {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  text-align: right;
}

.score-chips {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 9999px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--mono);
}

.chip-w { background: var(--red-bg); color: var(--red); }
.chip-c { background: var(--green-bg); color: var(--green); }

/* ─── MAIN ─── */
.main {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* ─── MODE SELECTOR ─── */
.mode-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.mode-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 9999px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.mode-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

.mode-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}

.mode-btn .badge {
  background: rgba(255,255,255,0.25);
  border-radius: 9999px;
  padding: 0 6px;
  font-size: 11px;
  font-family: var(--mono);
}

.mode-btn:not(.active) .badge {
  background: var(--surface2);
  color: var(--text3);
}

/* ─── QUESTION CARD ─── */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  animation: slideIn 0.2s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.q-num-badge {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--blue);
  background: var(--blue-light);
  padding: 3px 10px;
  border-radius: 9999px;
  font-weight: 500;
}

.q-wrong-count {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--red);
  background: var(--red-bg);
  padding: 3px 10px;
  border-radius: 9999px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.q-text {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.65;
  color: var(--text);
  margin-bottom: 20px;
}

/* ─── OPTIONS ─── */
.options { display: flex; flex-direction: column; gap: 9px; }

.opt {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 16px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 15px;
  color: var(--text);
  text-align: left;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  width: 100%;
  line-height: 1.5;
}

.opt:hover:not(:disabled) {
  border-color: var(--blue);
  background: var(--blue-light);
  transform: translateX(2px);
}

.opt:disabled { cursor: default; transform: none; }

.opt-lbl {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  min-width: 20px;
  flex-shrink: 0;
  margin-top: 2px;
}

.opt.is-correct {
  border-color: var(--green-border);
  background: var(--green-bg);
  color: var(--green);
}
.opt.is-correct .opt-lbl { color: var(--green); }

.opt.is-wrong {
  border-color: var(--red-border);
  background: var(--red-bg);
  color: var(--red);
}
.opt.is-wrong .opt-lbl { color: var(--red); }

.opt.is-reveal {
  border-color: var(--green-border);
  background: var(--green-bg);
  opacity: 0.65;
}

/* ─── RESULT BOX ─── */
.result-box {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  line-height: 1.6;
  animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-box.r-correct { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.result-box.r-wrong { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

.result-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* ─── NAV ─── */
.nav-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 16px;
  align-items: center;
}

.nav-btn {
  padding: 10px 22px;
  border-radius: 9999px;
  border: none;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.nav-primary { background: var(--blue); color: #fff; }
.nav-primary:hover { background: #1557b0; }

.nav-outline {
  background: transparent;
  color: var(--blue);
  border: 1.5px solid var(--blue);
}
.nav-outline:hover { background: var(--blue-light); }

.nav-gray {
  background: var(--surface);
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.nav-gray:hover { background: var(--surface2); }

.nav-orange {
  background: var(--orange-bg);
  color: var(--orange);
  border: 1.5px solid var(--orange-border);
}
.nav-orange:hover { filter: brightness(0.95); }

/* ─── EMPTY STATE ─── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text2);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty p { font-size: 14px; }

/* ─── DONE SCREEN ─── */
.done-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 24px;
  text-align: center;
  box-shadow: var(--shadow-md);
  animation: slideIn 0.3s ease;
}

.done-pct {
  font-size: 60px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--blue);
  line-height: 1;
  margin: 12px 0;
}

.done-grade { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.done-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }

.done-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}

.done-stat {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 14px;
}

.done-stat-val {
  font-size: 22px;
  font-weight: 700;
  font-family: var(--mono);
  display: block;
}

.done-stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ─── WRONG LIST (hotspot) ─── */
.wrong-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.wrong-item {
  background: var(--surface);
  border: 1px solid var(--red-border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

.wrong-item-text { font-size: 14px; color: var(--text); flex: 1; }
.wrong-item-count {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--red);
  background: var(--red-bg);
  padding: 2px 8px;
  border-radius: 9999px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ─── SECTION HEADER ─── */
.section-hd {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 24px;
}

/* ─── SHUFFLE INDICATOR ─── */
.shuffle-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--orange);
  background: var(--orange-bg);
  border: 1px solid var(--orange-border);
  padding: 2px 8px;
  border-radius: 9999px;
}

@media (max-width: 600px) {
  .q-text { font-size: 15px; }
  .opt { font-size: 14px; padding: 11px 13px; }
  .topbar-title { display: none; }
  .done-stats { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

const LABELS = ['ก','ข','ค','ง'];

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
// wrongCount[id] = number of times answered wrong (persistent across sessions)
let wrongCount = {};
try { wrongCount = JSON.parse(localStorage.getItem('hv_wrong') || '{}'); } catch(e){}

// answered[id] = {chosen, correct} — resets per session
const answered = {};

// current mode: 'all' | 'wrong'
let mode = 'all';
// shuffled question list for current session
let deck = [];
let curIdx = 0;
let shuffled = false;

function saveWrong() {
  try { localStorage.setItem('hv_wrong', JSON.stringify(wrongCount)); } catch(e){}
}

function shuffle(arr) {
  const a = [...arr];
  for(let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getWrongIds() {
  return Object.keys(wrongCount)
    .filter(id => wrongCount[id] > 0)
    .sort((a,b) => wrongCount[b] - wrongCount[a])
    .map(Number);
}

function buildDeck(doShuffle) {
  shuffled = doShuffle;
  if(mode === 'wrong') {
    const ids = getWrongIds();
    let questions = ids.map(id => RAW.find(q => q.id === id)).filter(Boolean);
    deck = doShuffle ? shuffle(questions) : questions;
  } else {
    deck = doShuffle ? shuffle([...RAW]) : [...RAW];
  }
  curIdx = 0;
}

/* ═══════════════════════════════════
   STATS
═══════════════════════════════════ */
function updateTopBar() {
  const total = 91;
  const ans = Object.keys(answered).length;
  const cor = Object.values(answered).filter(s=>s.correct).length;
  const wrng = ans - cor;
  document.getElementById('pb').style.width = Math.round(ans/total*100)+'%';
  document.getElementById('pb-label').textContent = ans+' / '+total;
  document.getElementById('chip-w').textContent = '✕ '+wrng;
  document.getElementById('chip-c').textContent = '✓ '+cor;
}

/* ═══════════════════════════════════
   ANSWER
═══════════════════════════════════ */
function doAnswer(qId, chosen) {
  if(answered[qId]) return;
  const q = RAW.find(x=>x.id===qId);
  const isCorrect = chosen === q.ans;
  answered[qId] = {chosen, correct: isCorrect};
  if(!isCorrect) {
    wrongCount[qId] = (wrongCount[qId]||0) + 1;
    saveWrong();
  }
  updateTopBar();
  renderCard();
}

/* ═══════════════════════════════════
   RENDER
═══════════════════════════════════ */
function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Mode bar
  const wrongIds = getWrongIds();
  const modeBar = document.createElement('div');
  modeBar.className = 'mode-bar';
  modeBar.innerHTML = `
    <button class="mode-btn ${mode==='all'?'active':''}" onclick="switchMode('all',false)">
      ทั้งหมด <span class="badge">91</span>
    </button>
    <button class="mode-btn ${mode==='all'?'':'active'}" onclick="switchMode('wrong',false)" ${wrongIds.length===0?'disabled':''}>
      ทบทวนข้อผิด <span class="badge">${wrongIds.length}</span>
    </button>`;
  main.appendChild(modeBar);

  // Shuffle row
  const shuffleRow = document.createElement('div');
  shuffleRow.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;';
  shuffleRow.innerHTML = `
    <button class="nav-btn nav-orange" onclick="doShuffle()" style="padding:7px 16px;font-size:13px;">
      🔀 สลับข้อสอบ
    </button>
    ${shuffled ? '<span class="shuffle-badge">🔀 กำลังเล่นแบบสุ่ม</span>' : ''}
    <button class="nav-btn nav-gray" onclick="resetWrongData()" style="padding:7px 14px;font-size:12px;" title="ล้างประวัติข้อผิด">
      🗑 ล้างประวัติ
    </button>`;
  main.appendChild(shuffleRow);

  // Card area
  const cardArea = document.createElement('div');
  cardArea.id = 'card-area';
  main.appendChild(cardArea);

  // Nav area
  const navArea = document.createElement('div');
  navArea.id = 'nav-area';
  main.appendChild(navArea);

  renderCard();
  updateTopBar();
}

function renderCard() {
  const cardArea = document.getElementById('card-area');
  const navArea = document.getElementById('nav-area');
  if(!cardArea) return;

  if(deck.length === 0) {
    cardArea.innerHTML = `<div class="empty">
      <div class="empty-icon">🎉</div>
      <h3>${mode==='wrong' ? 'ยังไม่มีข้อที่ตอบผิด!' : 'ไม่มีข้อให้แสดง'}</h3>
      <p>${mode==='wrong' ? 'ลองทำข้อสอบทั้งหมดก่อนนะครับ' : ''}</p>
    </div>`;
    navArea.innerHTML = '';
    return;
  }

  if(curIdx >= deck.length) {
    showDone();
    return;
  }

  const q = deck[curIdx];
  const ans = answered[q.id];
  const wc = wrongCount[q.id] || 0;

  let optsHtml = '';
  q.opts.forEach((opt, i) => {
    if(opt === '—') return;
    let cls = 'opt';
    if(ans) {
      if(i === q.ans) cls += ' is-correct';
      else if(i === ans.chosen && !ans.correct) cls += ' is-wrong';
      else cls += ' is-reveal';
    }
    optsHtml += `<button class="${cls}" ${ans?'disabled':''} onclick="doAnswer(${q.id},${i})">
      <span class="opt-lbl">${LABELS[i]}.</span>
      <span>${opt}</span>
    </button>`;
  });

  let resultHtml = '';
  if(ans) {
    if(ans.correct) {
      resultHtml = `<div class="result-box r-correct"><span class="result-icon">✓</span><span>ถูกต้อง!</span></div>`;
    } else {
      resultHtml = `<div class="result-box r-wrong">
        <span class="result-icon">✕</span>
        <span>ผิด — เฉลย: <strong>${LABELS[q.ans]}. ${q.opts[q.ans]}</strong></span>
      </div>`;
    }
  }

  cardArea.innerHTML = `<div class="q-card">
    <div class="q-meta">
      <span class="q-num-badge">ข้อที่ ${q.id} &nbsp;·&nbsp; ${curIdx+1}/${deck.length}</span>
      ${wc>0 ? `<span class="q-wrong-count">✕ ตอบผิดแล้ว ${wc} ครั้ง</span>` : ''}
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options">${optsHtml}</div>
    ${resultHtml}
  </div>`;

  // Nav buttons
  let navHtml = '<div class="nav-row">';
  if(curIdx > 0) navHtml += `<button class="nav-btn nav-outline" onclick="go(-1)">← ก่อนหน้า</button>`;
  if(ans && curIdx < deck.length-1) navHtml += `<button class="nav-btn nav-primary" onclick="go(1)">ถัดไป →</button>`;
  if(ans && curIdx === deck.length-1) navHtml += `<button class="nav-btn nav-primary" onclick="showDone()">ดูผลสรุป</button>`;
  navHtml += `<button class="nav-btn nav-gray" onclick="confirmReset()">เริ่มใหม่</button>`;
  navHtml += '</div>';
  navArea.innerHTML = navHtml;
}

function go(dir) {
  curIdx += dir;
  if(curIdx < 0) curIdx = 0;
  if(curIdx >= deck.length) curIdx = deck.length-1;
  renderCard();
}

function doShuffle() {
  buildDeck(true);
  renderMain();
}

function switchMode(m, doShuf) {
  mode = m;
  buildDeck(doShuf);
  renderMain();
}

function confirmReset() {
  if(confirm('เริ่มทำใหม่ตั้งแต่ต้น? (ประวัติข้อผิดยังอยู่)')) {
    Object.keys(answered).forEach(k=>delete answered[k]);
    buildDeck(shuffled);
    renderMain();
  }
}

function resetWrongData() {
  if(confirm('ล้างประวัติข้อที่ตอบผิดทั้งหมด?')) {
    Object.keys(wrongCount).forEach(k=>delete wrongCount[k]);
    saveWrong();
    renderMain();
  }
}

/* ═══════════════════════════════════
   DONE SCREEN
═══════════════════════════════════ */
function showDone() {
  const cardArea = document.getElementById('card-area');
  const navArea = document.getElementById('nav-area');

  const total = deck.length;
  const cor = deck.filter(q => answered[q.id]?.correct).length;
  const wrng = total - cor;
  const pct = Math.round(cor/total*100);
  let grade = pct>=90?'ยอดเยี่ยม! 🏅':pct>=80?'ดีมาก 🎯':pct>=70?'ดี 👍':pct>=60?'พอใช้ 📚':'ต้องฝึกเพิ่ม 💪';

  // top wrong questions
  const hotspots = deck
    .filter(q => !answered[q.id]?.correct)
    .sort((a,b)=>(wrongCount[b.id]||0)-(wrongCount[a.id]||0))
    .slice(0,5);

  let hotHtml = '';
  if(hotspots.length>0) {
    hotHtml = `<div class="section-hd">ข้อที่ตอบผิดบ่อย (รวมทุก session)</div>
    <div class="wrong-list">
    ${hotspots.map(q=>`
      <div class="wrong-item">
        <div class="wrong-item-text"><strong>ข้อ ${q.id}:</strong> ${q.text.slice(0,60)}${q.text.length>60?'…':''}</div>
        <span class="wrong-item-count">ผิด ${wrongCount[q.id]} ครั้ง</span>
      </div>`).join('')}
    </div>`;
  }

  cardArea.innerHTML = `<div class="done-card">
    <div style="font-size:14px;color:var(--text2);">ผลการทำข้อสอบ</div>
    <div class="done-pct">${pct}%</div>
    <div class="done-grade">${grade}</div>
    <div class="done-sub">ตอบถูก ${cor} ข้อ จาก ${total} ข้อ</div>
    <div class="done-stats">
      <div class="done-stat">
        <span class="done-stat-val" style="color:var(--green)">${cor}</span>
        <div class="done-stat-lbl">ถูก</div>
      </div>
      <div class="done-stat">
        <span class="done-stat-val" style="color:var(--red)">${wrng}</span>
        <div class="done-stat-lbl">ผิด</div>
      </div>
      <div class="done-stat">
        <span class="done-stat-val" style="color:var(--blue)">${pct}%</span>
        <div class="done-stat-lbl">คะแนน</div>
      </div>
    </div>
    ${hotHtml}
  </div>`;

  navArea.innerHTML = `<div class="nav-row" style="margin-top:16px;">
    ${wrng>0 ? `<button class="nav-btn nav-orange" onclick="switchMode('wrong',true)">ทบทวนข้อที่ผิด (${wrng})</button>` : ''}
    <button class="nav-btn nav-outline" onclick="switchMode('all',false)">ทำข้อสอบทั้งหมด</button>
    <button class="nav-btn nav-gray" onclick="doShuffle()">🔀 สลับแล้วทำใหม่</button>
  </div>`;
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
buildDeck(false);
renderMain();
</script>
</body>
</html>
