<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อสอบ High Voltage Testing — 91 ข้อ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --correct: #00e676;
    --wrong: #ff4444;
    --text: #e8f0fe;
    --muted: #6b7fa3;
    --gold: #ffd700;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 16px;
    border-radius: 2px;
  }

  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .stat-card {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    display: block;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  #stat-answered .stat-value { color: var(--accent); }
  #stat-correct .stat-value { color: var(--correct); }
  #stat-wrong .stat-value { color: var(--wrong); }
  #stat-score .stat-value { color: var(--gold); }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 30px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #007bff);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    transition: all 0.3s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-card.answered-correct { border-color: var(--correct); background: rgba(0,230,118,0.05); }
  .question-card.answered-wrong { border-color: var(--wrong); background: rgba(255,68,68,0.05); }
  .question-card.hidden { display: none; }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }

  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.6;
    color: var(--text);
    flex: 1;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    color: var(--text);
    transition: all 0.2s;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
    transform: translateX(3px);
  }

  .option-btn:disabled { cursor: default; }

  .option-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    min-width: 20px;
    flex-shrink: 0;
  }

  /* Answer states */
  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(0,230,118,0.12);
    color: var(--correct);
  }

  .option-btn.correct .option-label { color: var(--correct); }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255,68,68,0.12);
    color: var(--wrong);
  }

  .option-btn.wrong .option-label { color: var(--wrong); }

  .option-btn.reveal-correct {
    border-color: var(--correct);
    background: rgba(0,230,118,0.08);
  }

  /* Result badge */
  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    margin-top: 12px;
  }

  .result-badge.correct { color: var(--correct); background: rgba(0,230,118,0.1); }
  .result-badge.wrong { color: var(--wrong); background: rgba(255,68,68,0.1); }

  /* Reset button */
  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .btn {
    padding: 10px 24px;
    border-radius: 6px;
    border: none;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #00b8d9; transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Score modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    transform: scale(0.9);
    transition: transform 0.3s;
  }

  .modal-overlay.show .modal { transform: scale(1); }

  .modal-score {
    font-family: 'Space Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin: 16px 0;
  }

  .modal-grade {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .modal-detail {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  /* Scroll to top */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,212,255,0.4);
    transition: all 0.2s;
  }

  .scroll-top:hover { transform: translateY(-3px); }
  .scroll-top.visible { display: flex; }

  @media (max-width: 600px) {
    .question-card { padding: 16px; }
    .q-text { font-size: 14px; }
    .option-btn { font-size: 14px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-badge">⚡ High Voltage Testing</div>
    <h1>แบบทดสอบ <span>ไฟฟ้าแรงสูง</span></h1>
    <div class="subtitle">91 ข้อ — คลิกเลือกคำตอบเพื่อเช็คเฉลยทันที</div>
  </div>

  <div class="stats-bar">
    <div class="stat-card" id="stat-answered">
      <span class="stat-value" id="val-answered">0</span>
      <div class="stat-label">ตอบแล้ว / 91</div>
    </div>
    <div class="stat-card" id="stat-correct">
      <span class="stat-value" id="val-correct">0</span>
      <div class="stat-label">ถูก</div>
    </div>
    <div class="stat-card" id="stat-wrong">
      <span class="stat-value" id="val-wrong">0</span>
      <div class="stat-label">ผิด</div>
    </div>
    <div class="stat-card" id="stat-score">
      <span class="stat-value" id="val-score">—</span>
      <div class="stat-label">คะแนน %</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="filter-tabs">
    <button class="filter-btn active" onclick="filterQ('all', this)">ทั้งหมด (91)</button>
    <button class="filter-btn" onclick="filterQ('unanswered', this)">ยังไม่ตอบ</button>
    <button class="filter-btn" onclick="filterQ('correct', this)">ถูก ✓</button>
    <button class="filter-btn" onclick="filterQ('wrong', this)">ผิด ✗</button>
  </div>

  <div id="quiz-container"></div>

  <div class="actions">
    <button class="btn btn-primary" onclick="showScore()">ดูคะแนนรวม</button>
    <button class="btn btn-secondary" onclick="resetAll()">เริ่มใหม่ทั้งหมด</button>
    <button class="btn btn-secondary" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ ขึ้นบนสุด</button>
  </div>
</div>

<!-- Score Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div style="font-size:48px">🏆</div>
    <div class="modal-score" id="modal-score-val">0%</div>
    <div class="modal-grade" id="modal-grade"></div>
    <div class="modal-detail" id="modal-detail"></div>
    <button class="btn btn-primary" onclick="document.getElementById('modal-overlay').classList.remove('show')">ปิด</button>
  </div>
</div>

<button class="scroll-top" id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const questions = [
  { id:1, text:"จากรูป U1 = 22.5 kV (50 Hz); C2 = 30 pF; R2 = 6 MΩ; จงคำนวณหาค่า tan delta", options:["0.0546","0.0565","0.5654","0.0056"], answer:1 },
  { id:2, text:"มาตรฐานเดิม สำหรับการทดสอบลูกถ้วยฉนวนเจาะทะลุคือ", options:["ป้อนด้วยแรงดัน AC","ป้อนด้วยแรงดัน LI","ป้อนด้วยแรงดัน DC","ป้อนด้วยแรงดัน SI"], answer:0 },
  { id:3, text:"ข้อใดกล่าวถูกต้องเกี่ยวกับ Electrical methods of PD detection", options:["เหมาะสำหรับใช้หาตำแหน่ง PD","เหมาะสำหรับใช้หาปริมาณ PD","เหมาะสำหรับใช้ตรวจสอบสถานะของ PD","เหมาะสำหรับใช้หาความถี่ PD"], answer:1 },
  { id:4, text:"วัตถุประสงค์ของการสร้างแรงดันอิมพัลส์หน้าคลื่นชันคือ", options:["ใช้ทดสอบความคงทนของลูกถ้วยฉนวนประเภท D","ใช้ทดสอบความคงทนของลูกถ้วยฉนวนประเภท C","ใช้ทดสอบความคงทนของลูกถ้วยฉนวนประเภท A","ใช้ทดสอบความคงทนของลูกถ้วยฉนวนประเภท B"], answer:3 },
  { id:5, text:"ปริมาตรฉนวนของหม้อแปลงไฟฟ้ากำลังแปรผันกับค่าอะไร", options:["UL²","UL³","UH²","UH³"], answer:3 },
  { id:6, text:"Transformer oil ถูกจำแนกเป็นฉนวนประเภทใด", options:["Liquid insulation","Self-restoring insulation","Internal insulation","ถูกทุกข้อ"], answer:3 },
  { id:7, text:"จากรูป เป็นลักษณะการจัดวางระบบส่งจ่ายแบบใด", options:["Solid grounded system","Isolated system","Resistance grounded system","Resonant grounded system"], answer:3 },
  { id:8, text:"การทดสอบข้อใดจัดอยู่ในประเภท Type test", options:["System voltage test","Over voltage test","Flash over test","Temp cycle test"], answer:2 },
  { id:9, text:"จากรูป P หมายถึงอะไร", options:["Insulator type B","Insulator type C","Insulator type A","ถูกทุกข้อ"], answer:0 },
  { id:10, text:"(โจทย์หม้อแปลง cascade) จงหาขนาด kVA", options:["40 kVA","120 kVA","80 kVA","160 kVA"], answer:0 },
  { id:11, text:"ต้องการ bandwidth กว้างขึ้น ควรออกแบบอย่างไร", options:["ด้านในหนา","ไม่มีข้อใดถูก","ใช้วัสดุค่าความนำสูง","ด้านในบาง"], answer:3 },
  { id:12, text:"วิธีตรวจจับ PD แบบ DC อ้างอิงมาตรฐานใด", options:["IEC 60052","IEC 60270","IEC 60060-1","IEC 60071-1"], answer:1 },
  { id:13, text:"ค่า Ka ใน IEC 71-1 หมายถึง", options:["Air conversion factor","Voltage ratio correction factor","Safety factor","Atmospheric correction factor"], answer:3 },
  { id:14, text:"การวัดค่าแฟกเตอร์พลังงานสูญเสีย (ฉนวน) นิยมใช้อะไร", options:["Schering bridge","Glynne Bridge","Transformer ratio Arm Bridge","ถูกทุกข้อ"], answer:3 },
  { id:15, text:"จากรูป หมายเลข 6 คืออะไร", options:["ถูกทุกข้อ","Bushing แบบ R","Bushing แบบ Normal","Bushing แบบ C"], answer:3 },
  { id:16, text:"เมื่อเกิดฟ้าผ่าใกล้ตัว ควรทำอย่างไร", options:["นอนราบ","พนมมือ","วิ่งหนี","ยืนกระต่ายขาเดียว"], answer:3 },
  { id:17, text:"คำนวณค่า Ub", options:["0 kV","45.36 kV","55.53 kV","42.75 kV"], answer:3 },
  { id:18, text:"แรงเคลื่อนเหนี่ยวนำขึ้นกับอะไร", options:["du/dt","Q","Ipeak","di/dt"], answer:3 },
  { id:19, text:"ใครให้นิยามฟ้าผ่า", options:["Thomas Edison","Benjamin Franklin","Frankenstein","Nikola Tesla"], answer:1 },
  { id:20, text:"คำนวณ tan delta", options:["0.8482","0.0804","0.0084","0.0848"], answer:3 },
  { id:21, text:"ฟ้าผ่าลงสายดิน → เกิดอะไร", options:["ถูกทุกข้อ","Spark Over","Back Flash Over","Flash Over"], answer:2 },
  { id:22, text:"คำนวณ Uis2", options:["1,590.77 kV","1,560.77 kV","1,506.77 kV","1,509.77 kV"], answer:2 },
  { id:23, text:"Time to crest (50%)", options:["1.2 µs","1.8 µs","5.5 µs","1.1 µs"], answer:2 },
  { id:24, text:"คำนวณ Uis1", options:["1,506.77 kV","1,509.77 kV","1,560.77 kV","1,590.77 kV"], answer:3 },
  { id:25, text:"divider ที่นิยมใช้", options:["ถูกทุกข้อ","C divider","RC divider","R divider"], answer:0 },
  { id:26, text:"จากรูป คืออุปกรณ์อะไร", options:["Hall Effect current sensor","Coaxial cylindrical impulse resistor","Rogowski coil","Current transformer"], answer:2 },
  { id:27, text:"การทดสอบ Flash over สำหรับลูกถ้วยฉนวน นิยมทดสอบรูปแบบใด", options:["Impulse 50% test","1 นาที Dry Test","ถูกทุกข้อ","1 นาที Wet Test"], answer:2 },
  { id:28, text:"ข้อใดต่อไปนี้คือ PD", options:["Water treeing","Electric treeing","ถูกทุกข้อ","Corona discharge"], answer:2 },
  { id:29, text:"ระบบป้องกันฟ้าผ่าประกอบด้วยอะไรบ้าง", options:["Air terminal, Down conductor, Ground terminal","Air terminal, Franklin rod, Ground terminal","Air terminal, Arrestors, Down conductor","Air terminal, Arrestors, Ground terminal"], answer:0 },
  { id:30, text:"Standard reference atmospheric condition IEC คืออะไรบ้าง", options:["ความดันบรรยากาศ 1013 hPa","ความชื้นสัมบูรณ์ 11.1 g/m³","ถูกทุกข้อ","อุณหภูมิ 25 องศา"], answer:0 },
  { id:31, text:"จากรูป พื้นที่แรเงา เรียกว่าอะไร", options:["Striking zone","Protective zone","Operation zone","Lightning zone"], answer:1 },
  { id:32, text:"จากรูป C1, C2 หมายถึงอะไร", options:["Stray capacitor","Series capacitor","Capacitor divider","Capacitor ratio"], answer:2 },
  { id:33, text:"การวัดกระแสอิมพัลส์ สามารถวัดได้ด้วยวิธีใด", options:["Series resistance","Rogowski coil","ถูกทุกข้อ","Shunt resistance"], answer:2 },
  { id:34, text:"จากรูป D1 ต้องทนแรงดันได้ไม่น้อยกว่าเท่าไร", options:["2UD","2UL","2UC","2UT"], answer:3 },
  { id:35, text:"จากรูป คืออุปกรณ์อะไร", options:["Impulse voltage divider type C","Impulse voltage divider type RC","Impulse voltage divider type R","—"], answer:2 },
  { id:36, text:"กรณีรูปคลื่นกระแสอิมพัลส์มาตรฐาน 8/20 µs ต้องการค่า Time response ไม่เกินเท่าไร", options:["0.8 µs","8 µs","1.6 µs","20 µs"], answer:2 },
  { id:37, text:"จากรูป เมื่อ Zw = 393 Ω; H = 46 m, S = 32 kA/µs, US = 525 kV จงคำนวณหาค่ากระแสฟ้าผ่า (i)", options:["56 kA","65 kA","96 kA","100 kA"], answer:2 },

const labels = ['A', 'B', 'C', 'D'];
const state = {}; // { qId: { chosen: idx, correct: bool } }

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${q.id}`;

    const qText = q.options.length === 4 ? q.text : q.text;

    let opts = '';
    q.options.forEach((opt, i) => {
      if(opt === '—') return;
      opts += `<button class="option-btn" id="btn-${q.id}-${i}" onclick="answer(${q.id}, ${i})">`
             + `<span class="option-label">${labels[i]}</span>`
             + `<span>${opt}</span></button>`;
    });

    card.innerHTML = `
      <div class="q-header">
        <span class="q-number">ข้อ ${q.id}</span>
        <div class="q-text">${qText}</div>
      </div>
      <div class="options" id="opts-${q.id}">${opts}</div>
      <div id="result-${q.id}"></div>
    `;
    container.appendChild(card);
  });
}

function answer(qId, chosen) {
  if (state[qId] !== undefined) return;

  const q = questions.find(x => x.id === qId);
  const isCorrect = chosen === q.answer;
  state[qId] = { chosen, correct: isCorrect };

  // Disable all buttons
  for(let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`btn-${qId}-${i}`);
    if(!btn) continue;
    btn.disabled = true;
    if(i === q.answer) btn.classList.add('reveal-correct');
  }

  const chosenBtn = document.getElementById(`btn-${qId}-${chosen}`);
  if(chosenBtn) {
    chosenBtn.classList.remove('reveal-correct');
    chosenBtn.classList.add(isCorrect ? 'correct' : 'wrong');
  }

  const card = document.getElementById(`card-${qId}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const resultDiv = document.getElementById(`result-${qId}`);
  resultDiv.innerHTML = isCorrect
    ? `<span class="result-badge correct">✓ ถูกต้อง!</span>`
    : `<span class="result-badge wrong">✗ ผิด — เฉลย: ${labels[q.answer]}. ${q.options[q.answer]}</span>`;

  updateStats();
}

function updateStats() {
  const answered = Object.keys(state).length;
  const correct = Object.values(state).filter(s => s.correct).length;
  const wrong = answered - correct;
  const score = answered > 0 ? Math.round(correct / answered * 100) : 0;

  document.getElementById('val-answered').textContent = answered;
  document.getElementById('val-correct').textContent = correct;
  document.getElementById('val-wrong').textContent = wrong;
  document.getElementById('val-score').textContent = answered > 0 ? score + '%' : '—';
  document.getElementById('progress-fill').style.width = (answered / 91 * 100) + '%';
}

function filterQ(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  questions.forEach(q => {
    const card = document.getElementById(`card-${q.id}`);
    let show = true;
    if(type === 'unanswered') show = state[q.id] === undefined;
    else if(type === 'correct') show = state[q.id]?.correct === true;
    else if(type === 'wrong') show = state[q.id]?.correct === false;
    card.classList.toggle('hidden', !show);
  });
}

function showScore() {
  const answered = Object.keys(state).length;
  const correct = Object.values(state).filter(s => s.correct).length;
  const pct = answered > 0 ? Math.round(correct / 91 * 100) : 0;

  let grade = '', emoji = '';
  if(pct >= 90) { grade = 'ยอดเยี่ยม! 🏅'; emoji = '🌟'; }
  else if(pct >= 80) { grade = 'ดีมาก'; emoji = '🎯'; }
  else if(pct >= 70) { grade = 'ดี'; emoji = '👍'; }
  else if(pct >= 60) { grade = 'พอใช้'; emoji = '📚'; }
  else { grade = 'ต้องฝึกเพิ่ม'; emoji = '💪'; }

  document.getElementById('modal-score-val').textContent = pct + '%';
  document.getElementById('modal-grade').textContent = emoji + ' ' + grade;
  document.getElementById('modal-detail').textContent =
    `ตอบถูก ${correct} ข้อ จาก ${answered} ข้อที่ตอบ (ทั้งหมด 91 ข้อ)`;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal(e) {
  if(e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('show');
}

function resetAll() {
  if(!confirm('ต้องการเริ่มใหม่ทั้งหมดหรือไม่?')) return;
  Object.keys(state).forEach(k => delete state[k]);
  buildQuiz();
  updateStats();
  filterQ('all', document.querySelector('.filter-btn'));
}

window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top-btn');
  btn.classList.toggle('visible', window.scrollY > 400);
});

buildQuiz();
updateStats();
</script>
